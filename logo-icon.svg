<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0533"/>
      <stop offset="65%"  stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="gp" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gc" cx="50%" cy="72%" r="60%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <clipPath id="circ">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Ambient glow layers clipped to circle -->
  <g clip-path="url(#circ)">
    <ellipse cx="200" cy="148" rx="148" ry="120" fill="url(#gp)" filter="url(#blur-soft)"/>
    <ellipse cx="200" cy="282" rx="148" ry="120" fill="url(#gc)" filter="url(#blur-soft)"/>
  </g>

  <!-- Letter F centered — Impact 230px, baseline at y=282 gives cap-height center ~200 -->
  <text x="200" y="282" text-anchor="middle"
        font-family="Impact,'Arial Black',sans-serif"
        font-size="230" font-weight="900"
        fill="url(#fg)">F</text>

  <!-- Particle dots scattered around canvas -->
  <circle cx="48"  cy="68"  r="2.5" fill="white" opacity="0.12"/>
  <circle cx="330" cy="52"  r="2"   fill="white" opacity="0.10"/>
  <circle cx="375" cy="168" r="3"   fill="white" opacity="0.13"/>
  <circle cx="362" cy="340" r="2"   fill="white" opacity="0.11"/>
  <circle cx="55"  cy="295" r="2.5" fill="white" opacity="0.10"/>
  <circle cx="28"  cy="178" r="2"   fill="white" opacity="0.12"/>
  <circle cx="142" cy="30"  r="2"   fill="white" opacity="0.10"/>
  <circle cx="268" cy="22"  r="2.5" fill="white" opacity="0.13"/>
  <circle cx="388" cy="95"  r="2"   fill="white" opacity="0.10"/>
  <circle cx="82"  cy="358" r="3"   fill="white" opacity="0.11"/>
  <circle cx="318" cy="372" r="2"   fill="white" opacity="0.10"/>
  <circle cx="195" cy="384" r="2.5" fill="white" opacity="0.12"/>
  <circle cx="125" cy="362" r="2"   fill="white" opacity="0.10"/>
</svg>
