<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    FRMLS logo-icon.svg — 400×400
    Circular dot wreath — rings of circles varying in size,
    purple #7c3aed → cyan #06b6d4 gradient across the canvas.
  -->
  <defs>
    <!-- Dark background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#120220"/>
      <stop offset="60%"  stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- Gradient spans the full canvas in userSpace — each dot picks up its
         positional color: top-left = purple, bottom-right = cyan -->
    <linearGradient id="g" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Subtle central atmosphere glow -->
    <radialGradient id="atm" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#0891b2" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cc">
      <circle cx="200" cy="200" r="198"/>
    </clipPath>
  </defs>

  <!-- Dark circle background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- Subtle central atmosphere -->
  <circle cx="200" cy="200" r="200" fill="url(#atm)"/>

  <!-- ═══════════════════════════════════════════════════════════
       WREATH DOTS — three rings + outer scatter
       All positions calculated on rings from center (200,200).
       Sizes decrease outward from the primary ring.
       ═══════════════════════════════════════════════════════════ -->
  <g clip-path="url(#cc)">

    <!-- ── PRIMARY RING R=130 — large circles ─────────────────── -->
    <!-- 8 evenly-spaced anchors, r=18–21 -->
    <circle cx="200" cy="70"  r="20" fill="url(#g)"/>  <!-- top -->
    <circle cx="292" cy="108" r="18" fill="url(#g)"/>  <!-- top-right -->
    <circle cx="330" cy="200" r="21" fill="url(#g)"/>  <!-- right -->
    <circle cx="292" cy="292" r="19" fill="url(#g)"/>  <!-- bottom-right -->
    <circle cx="200" cy="330" r="20" fill="url(#g)"/>  <!-- bottom -->
    <circle cx="108" cy="292" r="18" fill="url(#g)"/>  <!-- bottom-left -->
    <circle cx="70"  cy="200" r="21" fill="url(#g)"/>  <!-- left -->
    <circle cx="108" cy="108" r="19" fill="url(#g)"/>  <!-- top-left -->

    <!-- ── SECONDARY RING R=128 — medium circles ──────────────── -->
    <!-- Sit between the large circles, r=12–14 -->
    <circle cx="248" cy="78"  r="13" fill="url(#g)"/>  <!-- top → top-right -->
    <circle cx="322" cy="148" r="12" fill="url(#g)"/>  <!-- top-right → right -->
    <circle cx="322" cy="252" r="12" fill="url(#g)"/>  <!-- right → bottom-right -->
    <circle cx="252" cy="322" r="13" fill="url(#g)"/>  <!-- bottom-right → bottom -->
    <circle cx="148" cy="322" r="12" fill="url(#g)"/>  <!-- bottom → bottom-left -->
    <circle cx="78"  cy="252" r="11" fill="url(#g)"/>  <!-- bottom-left → left -->
    <circle cx="78"  cy="148" r="12" fill="url(#g)"/>  <!-- left → top-left -->
    <circle cx="148" cy="78"  r="13" fill="url(#g)"/>  <!-- top-left → top -->

    <!-- ── OUTER RING R=155 — small dots ──────────────────────── -->
    <!-- r=6–8, framing outside the large circles -->
    <circle cx="200" cy="45"  r="7"  fill="url(#g)"/>
    <circle cx="258" cy="57"  r="6"  fill="url(#g)"/>
    <circle cx="308" cy="92"  r="7"  fill="url(#g)"/>
    <circle cx="343" cy="143" r="6"  fill="url(#g)"/>
    <circle cx="355" cy="200" r="7"  fill="url(#g)"/>
    <circle cx="343" cy="257" r="6"  fill="url(#g)"/>
    <circle cx="308" cy="308" r="7"  fill="url(#g)"/>
    <circle cx="257" cy="343" r="6"  fill="url(#g)"/>
    <circle cx="200" cy="355" r="7"  fill="url(#g)"/>
    <circle cx="143" cy="343" r="6"  fill="url(#g)"/>
    <circle cx="92"  cy="308" r="7"  fill="url(#g)"/>
    <circle cx="57"  cy="257" r="6"  fill="url(#g)"/>
    <circle cx="45"  cy="200" r="7"  fill="url(#g)"/>
    <circle cx="57"  cy="143" r="6"  fill="url(#g)"/>
    <circle cx="92"  cy="92"  r="7"  fill="url(#g)"/>
    <circle cx="143" cy="57"  r="6"  fill="url(#g)"/>

    <!-- ── OUTERMOST RING R=168 — tiny accent dots ────────────── -->
    <!-- r=3–4, the fine scatter that gives the wreath its richness -->
    <circle cx="234" cy="38"  r="3.5" fill="url(#g)"/>
    <circle cx="280" cy="52"  r="3"   fill="url(#g)"/>
    <circle cx="324" cy="76"  r="3.5" fill="url(#g)"/>
    <circle cx="358" cy="114" r="3"   fill="url(#g)"/>
    <circle cx="370" cy="162" r="3.5" fill="url(#g)"/>
    <circle cx="364" cy="234" r="3"   fill="url(#g)"/>
    <circle cx="346" cy="278" r="3.5" fill="url(#g)"/>
    <circle cx="318" cy="320" r="3"   fill="url(#g)"/>
    <circle cx="280" cy="350" r="3.5" fill="url(#g)"/>
    <circle cx="234" cy="364" r="3"   fill="url(#g)"/>
    <circle cx="166" cy="364" r="3"   fill="url(#g)"/>
    <circle cx="120" cy="350" r="3.5" fill="url(#g)"/>
    <circle cx="82"  cy="320" r="3"   fill="url(#g)"/>
    <circle cx="54"  cy="278" r="3.5" fill="url(#g)"/>
    <circle cx="36"  cy="234" r="3"   fill="url(#g)"/>
    <circle cx="36"  cy="166" r="3.5" fill="url(#g)"/>
    <circle cx="54"  cy="120" r="3"   fill="url(#g)"/>
    <circle cx="82"  cy="82"  r="3.5" fill="url(#g)"/>
    <circle cx="120" cy="52"  r="3"   fill="url(#g)"/>
    <circle cx="166" cy="38"  r="3"   fill="url(#g)"/>

  </g>
</svg>
