<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    FRMLS logo-icon.svg — 400×400
    Geometric chevron ">" mark, inspired by Linear / Vercel precision.
    Bold filled polygon, purple→cyan left-to-right gradient.
  -->
  <defs>
    <!-- Background radial: deep purple center → near-black edges -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e053e"/>
      <stop offset="55%"  stop-color="#0c0618"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- Chevron fill: purple left → cyan right across the mark -->
    <linearGradient id="fg" x1="72" y1="200" x2="316" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Sheen highlight on top edge of upper arm -->
    <linearGradient id="hl" x1="72" y1="200" x2="316" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.00)"/>
    </linearGradient>
    <!-- Purple ambient glow — left/open end -->
    <radialGradient id="gp" cx="25%" cy="50%" r="48%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan ambient glow — right/tip end -->
    <radialGradient id="gc" cx="80%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <clipPath id="cc">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Dark circle background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Ambient glows clipped to the circle -->
  <g clip-path="url(#cc)">
    <circle cx="200" cy="200" r="200" fill="url(#gp)"/>
    <circle cx="200" cy="200" r="200" fill="url(#gc)"/>
  </g>

  <!-- Blurred glow copy of the chevron underneath (depth/luminance) -->
  <path d="M 316,200 L 72,100 L 72,150 L 264,200 L 72,250 L 72,300 Z"
        fill="url(#fg)" opacity="0.50" filter="url(#glow-blur)"
        clip-path="url(#cc)"/>

  <!-- Primary chevron — bold, sharp, geometric ">" pointing right -->
  <path d="M 316,200 L 72,100 L 72,150 L 264,200 L 72,250 L 72,300 Z"
        fill="url(#fg)"/>

  <!-- Sheen: thin highlight triangle along the upper arm's top edge -->
  <path d="M 316,200 L 72,100 L 72,116 L 300,200 Z"
        fill="url(#hl)"/>

  <!-- Subtle inner ring on the dark circle (premium bezel feel) -->
  <circle cx="200" cy="200" r="192" fill="none"
          stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>

  <!-- Particle dots scattered around canvas, white at 10–14% opacity -->
  <circle cx="52"  cy="72"  r="2.5" fill="white" opacity="0.13"/>
  <circle cx="342" cy="48"  r="2"   fill="white" opacity="0.10"/>
  <circle cx="372" cy="170" r="2.5" fill="white" opacity="0.12"/>
  <circle cx="358" cy="352" r="2"   fill="white" opacity="0.10"/>
  <circle cx="60"  cy="308" r="2.5" fill="white" opacity="0.12"/>
  <circle cx="30"  cy="186" r="2"   fill="white" opacity="0.10"/>
  <circle cx="170" cy="34"  r="2"   fill="white" opacity="0.10"/>
  <circle cx="264" cy="376" r="2.5" fill="white" opacity="0.10"/>
  <circle cx="355" cy="270" r="2"   fill="white" opacity="0.10"/>
</svg>
