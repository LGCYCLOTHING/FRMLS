<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0533"/>
      <stop offset="58%"  stop-color="#0e0618"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- Frame stroke gradient: purple top-left → cyan bottom-right (clockwise feel) -->
    <linearGradient id="fg" x1="78" y1="78" x2="322" y2="322" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Glow radials -->
    <radialGradient id="gp" cx="34%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gc" cx="70%" cy="65%" r="55%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="gb" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <clipPath id="cc">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background dark circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Soft ambient glows clipped to circle -->
  <g clip-path="url(#cc)">
    <circle cx="200" cy="200" r="200" fill="url(#gp)"/>
    <circle cx="200" cy="200" r="200" fill="url(#gc)"/>
  </g>

  <!-- Open square frame — top-right corner intentionally broken/open.
       Stroke travels: top-near-right → left across top → top-left corner →
       down left → bottom-left corner → right across bottom →
       bottom-right corner → up right side — stops before top-right corner.
       Thick 26px rounded stroke, gradient purple→cyan clockwise. -->
  <path d="M 307,78
           L 93,78
           Q 78,78 78,93
           L 78,307
           Q 78,322 93,322
           L 307,322
           Q 322,322 322,307
           L 322,93"
        stroke="url(#fg)"
        stroke-width="26"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Particle dots — white at 10% opacity -->
  <circle cx="52"  cy="70"  r="2.5" fill="white" opacity="0.10"/>
  <circle cx="342" cy="46"  r="2"   fill="white" opacity="0.10"/>
  <circle cx="374" cy="174" r="2.5" fill="white" opacity="0.10"/>
  <circle cx="360" cy="350" r="2"   fill="white" opacity="0.10"/>
  <circle cx="58"  cy="308" r="2.5" fill="white" opacity="0.10"/>
  <circle cx="30"  cy="186" r="2"   fill="white" opacity="0.10"/>
  <circle cx="172" cy="32"  r="2"   fill="white" opacity="0.10"/>
  <circle cx="266" cy="376" r="2.5" fill="white" opacity="0.10"/>
  <circle cx="108" cy="374" r="2"   fill="white" opacity="0.10"/>
</svg>
