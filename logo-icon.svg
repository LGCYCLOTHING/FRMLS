<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    FRMLS logo-icon.svg — 400×400
    Non-uniform dot wreath with individual clockwise gradient colors.
    Purple #7c3aed (top) → cyan #06b6d4 (bottom) → purple again.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#120220"/>
      <stop offset="60%"  stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- Subtle side glows: purple left, cyan right -->
    <radialGradient id="glow-l" cx="20%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-r" cx="80%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cc">
      <circle cx="200" cy="200" r="198"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- Side glows -->
  <circle cx="200" cy="200" r="200" fill="url(#glow-l)"/>
  <circle cx="200" cy="200" r="200" fill="url(#glow-r)"/>

  <!-- ═══════════════════════════════════════════════════════════
       38 individually-colored dots — clockwise from top.
       Color formula: t = (1 - cos(θ × π/180)) / 2
       purple=(124,58,237) → cyan=(6,182,212) → purple
       ═══════════════════════════════════════════════════════════ -->
  <g clip-path="url(#cc)">

    <!-- TOP CLUSTER (θ ≈ 355–12°) — purple anchor + tight scatter -->
    <circle cx="187" cy="53"  r="6"    fill="#7c3aed"/>  <!-- θ=355 small -->
    <circle cx="200" cy="50"  r="21"   fill="#7c3aed"/>  <!-- θ=0   LARGE anchor -->
    <circle cx="220" cy="55"  r="13"   fill="#7b3bed"/>  <!-- θ=8   medium -->
    <circle cx="231" cy="55"  r="5"    fill="#7b3bed"/>  <!-- θ=12  tiny -->

    <!-- UPPER-RIGHT CLUSTER (θ ≈ 25–50°) — dropping toward right -->
    <circle cx="263" cy="64"  r="5"    fill="#7640ec"/>  <!-- θ=25  tiny -->
    <circle cx="285" cy="79"  r="3"    fill="#7145eb"/>  <!-- θ=35  tiny -->
    <circle cx="297" cy="92"  r="11"   fill="#6d4aea"/>  <!-- θ=42  medium -->
    <circle cx="307" cy="97"  r="6"    fill="#694de9"/>  <!-- θ=46  small -->
    <circle cx="311" cy="107" r="12"   fill="#6750e8"/>  <!-- θ=50  medium -->

    <!-- RIGHT CLUSTER (θ ≈ 62–78°) — large anchor right side -->
    <circle cx="332" cy="130" r="20"   fill="#5d5be6"/>  <!-- θ=62  LARGE anchor -->
    <circle cx="339" cy="155" r="11"   fill="#5365e4"/>  <!-- θ=72  medium -->
    <circle cx="345" cy="169" r="3"    fill="#4d6be3"/>  <!-- θ=78  tiny -->

    <!-- LOWER-RIGHT (θ ≈ 108–148°) — sweeping down toward bottom -->
    <circle cx="338" cy="245" r="5"    fill="#2f8bdd"/>  <!-- θ=108 tiny -->
    <circle cx="337" cy="255" r="13"   fill="#2b90dc"/>  <!-- θ=112 medium -->
    <circle cx="323" cy="286" r="22"   fill="#1f9bd9"/>  <!-- θ=125 LARGE anchor -->
    <circle cx="299" cy="310" r="12"   fill="#15a6d6"/>  <!-- θ=138 medium -->
    <circle cx="287" cy="316" r="7"    fill="#11aad5"/>  <!-- θ=143 small -->
    <circle cx="278" cy="326" r="2.5"  fill="#0eadd4"/>  <!-- θ=148 tiny -->

    <!-- BOTTOM CLUSTER (θ ≈ 162–198°) — cyan anchor at bottom -->
    <circle cx="245" cy="338" r="5"    fill="#09b3d4"/>  <!-- θ=162 tiny -->
    <circle cx="231" cy="345" r="11"   fill="#07b5d4"/>  <!-- θ=168 medium -->
    <circle cx="200" cy="350" r="20"   fill="#06b6d4"/>  <!-- θ=180 LARGE anchor (full cyan) -->
    <circle cx="169" cy="345" r="12"   fill="#07b5d4"/>  <!-- θ=192 medium -->
    <circle cx="155" cy="338" r="5"    fill="#09b3d4"/>  <!-- θ=198 tiny -->

    <!-- LOWER-LEFT (θ ≈ 210–268°) -->
    <circle cx="126" cy="328" r="3"    fill="#0eaed5"/>  <!-- θ=210 tiny -->
    <circle cx="107" cy="311" r="5"    fill="#14a7d6"/>  <!-- θ=220 tiny -->
    <circle cx="87"  cy="295" r="6"    fill="#1ba0d8"/>  <!-- θ=230 small -->
    <circle cx="80"  cy="281" r="13"   fill="#209ad9"/>  <!-- θ=236 medium -->
    <circle cx="61"  cy="256" r="21"   fill="#2c8fdc"/>  <!-- θ=248 LARGE anchor -->
    <circle cx="56"  cy="225" r="12"   fill="#3881df"/>  <!-- θ=260 medium -->
    <circle cx="52"  cy="205" r="3"    fill="#4079e1"/>  <!-- θ=268 tiny -->

    <!-- LEFT CLUSTER (θ ≈ 272–298°) -->
    <circle cx="55"  cy="195" r="2.5"  fill="#4277e1"/>  <!-- θ=272 tiny -->
    <circle cx="59"  cy="154" r="7"    fill="#5365e4"/>  <!-- θ=288 small -->
    <circle cx="66"  cy="146" r="11"   fill="#5761e5"/>  <!-- θ=292 medium -->
    <circle cx="69"  cy="131" r="13"   fill="#5d5be6"/>  <!-- θ=298 medium -->

    <!-- UPPER-LEFT (θ ≈ 310–334°) — sweeping back to top -->
    <circle cx="85"  cy="104" r="20"   fill="#6750e8"/>  <!-- θ=310 LARGE anchor -->
    <circle cx="110" cy="85"  r="12"   fill="#7145eb"/>  <!-- θ=322 medium -->
    <circle cx="122" cy="75"  r="5"    fill="#7640ec"/>  <!-- θ=328 tiny -->
    <circle cx="136" cy="70"  r="3"    fill="#783eec"/>  <!-- θ=334 tiny -->

  </g>
</svg>
