<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="500" height="100">
  <!--
    FRMLS logo-wordmark.svg — 500×100px transparent background
    Dot-wreath icon left + "FRMLS" full-word purple→cyan gradient right.
    Space Grotesk 700 via @import; falls back to system-ui 900 as img.
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
  </style>
  <defs>
    <!-- Icon background -->
    <radialGradient id="w-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#120220"/>
      <stop offset="60%"  stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- Side glows -->
    <radialGradient id="w-glow-l" cx="20%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="w-glow-r" cx="80%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="w-cc">
      <circle cx="200" cy="200" r="198"/>
    </clipPath>
    <!-- Full-word gradient: purple (F) → cyan (S) -->
    <linearGradient id="word-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- ── Mini dot-wreath icon: 72×72 at x=2, y=14 ── -->
  <svg x="2" y="14" width="72" height="72" viewBox="0 0 400 400">
    <circle cx="200" cy="200" r="200" fill="url(#w-bg)"/>
    <circle cx="200" cy="200" r="200" fill="url(#w-glow-l)"/>
    <circle cx="200" cy="200" r="200" fill="url(#w-glow-r)"/>
    <g clip-path="url(#w-cc)">

      <!-- TOP CLUSTER -->
      <circle cx="187" cy="53"  r="6"    fill="#7c3aed"/>
      <circle cx="200" cy="50"  r="21"   fill="#7c3aed"/>
      <circle cx="220" cy="55"  r="13"   fill="#7b3bed"/>
      <circle cx="231" cy="55"  r="5"    fill="#7b3bed"/>

      <!-- UPPER-RIGHT CLUSTER -->
      <circle cx="263" cy="64"  r="5"    fill="#7640ec"/>
      <circle cx="285" cy="79"  r="3"    fill="#7145eb"/>
      <circle cx="297" cy="92"  r="11"   fill="#6d4aea"/>
      <circle cx="307" cy="97"  r="6"    fill="#694de9"/>
      <circle cx="311" cy="107" r="12"   fill="#6750e8"/>

      <!-- RIGHT CLUSTER -->
      <circle cx="332" cy="130" r="20"   fill="#5d5be6"/>
      <circle cx="339" cy="155" r="11"   fill="#5365e4"/>
      <circle cx="345" cy="169" r="3"    fill="#4d6be3"/>

      <!-- LOWER-RIGHT -->
      <circle cx="338" cy="245" r="5"    fill="#2f8bdd"/>
      <circle cx="337" cy="255" r="13"   fill="#2b90dc"/>
      <circle cx="323" cy="286" r="22"   fill="#1f9bd9"/>
      <circle cx="299" cy="310" r="12"   fill="#15a6d6"/>
      <circle cx="287" cy="316" r="7"    fill="#11aad5"/>
      <circle cx="278" cy="326" r="2.5"  fill="#0eadd4"/>

      <!-- BOTTOM CLUSTER -->
      <circle cx="245" cy="338" r="5"    fill="#09b3d4"/>
      <circle cx="231" cy="345" r="11"   fill="#07b5d4"/>
      <circle cx="200" cy="350" r="20"   fill="#06b6d4"/>
      <circle cx="169" cy="345" r="12"   fill="#07b5d4"/>
      <circle cx="155" cy="338" r="5"    fill="#09b3d4"/>

      <!-- LOWER-LEFT -->
      <circle cx="126" cy="328" r="3"    fill="#0eaed5"/>
      <circle cx="107" cy="311" r="5"    fill="#14a7d6"/>
      <circle cx="87"  cy="295" r="6"    fill="#1ba0d8"/>
      <circle cx="80"  cy="281" r="13"   fill="#209ad9"/>
      <circle cx="61"  cy="256" r="21"   fill="#2c8fdc"/>
      <circle cx="56"  cy="225" r="12"   fill="#3881df"/>
      <circle cx="52"  cy="205" r="3"    fill="#4079e1"/>

      <!-- LEFT CLUSTER -->
      <circle cx="55"  cy="195" r="2.5"  fill="#4277e1"/>
      <circle cx="59"  cy="154" r="7"    fill="#5365e4"/>
      <circle cx="66"  cy="146" r="11"   fill="#5761e5"/>
      <circle cx="69"  cy="131" r="13"   fill="#5d5be6"/>

      <!-- UPPER-LEFT -->
      <circle cx="85"  cy="104" r="20"   fill="#6750e8"/>
      <circle cx="110" cy="85"  r="12"   fill="#7145eb"/>
      <circle cx="122" cy="75"  r="5"    fill="#7640ec"/>
      <circle cx="136" cy="70"  r="3"    fill="#783eec"/>

    </g>
  </svg>

  <!-- ── FRMLS wordmark: full-word purple→cyan gradient ── -->
  <text x="88" y="72"
        font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="58"
        font-weight="700"
        fill="url(#word-grad)"
        style="letter-spacing:-0.02em">FRMLS</text>
</svg>
