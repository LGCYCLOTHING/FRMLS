<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="500" height="100">
  <!--
    FRMLS logo-wordmark.svg — 500×100px transparent background
    Montserrat 900 (Black) via @import — loads when opened directly.
    Falls back to system-ui Black / Inter 900 when used as <img>.
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&amp;display=swap');
  </style>
  <defs>
    <!-- Mini icon: background circle gradient -->
    <radialGradient id="w-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e053e"/>
      <stop offset="55%"  stop-color="#0c0618"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- Mini icon: chevron fill — purple left → cyan right -->
    <linearGradient id="w-fg" x1="72" y1="200" x2="316" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Mini icon: chevron top-edge sheen -->
    <linearGradient id="w-hl" x1="72" y1="200" x2="316" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.00)"/>
    </linearGradient>
    <!-- Mini icon: ambient glows -->
    <radialGradient id="w-gp" cx="25%" cy="50%" r="48%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="w-gc" cx="80%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="w-gblur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <clipPath id="w-cc">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
    <!-- "S" letter horizontal gradient: purple → cyan -->
    <linearGradient id="w-sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- ── Mini icon: 64×64px at x=2, y=18 (vertically centered in 100px) ── -->
  <svg x="2" y="18" width="64" height="64" viewBox="0 0 400 400">
    <circle cx="200" cy="200" r="200" fill="url(#w-bg)"/>
    <g clip-path="url(#w-cc)">
      <circle cx="200" cy="200" r="200" fill="url(#w-gp)"/>
      <circle cx="200" cy="200" r="200" fill="url(#w-gc)"/>
    </g>
    <!-- Blurred glow copy -->
    <path d="M 316,200 L 72,100 L 72,150 L 264,200 L 72,250 L 72,300 Z"
          fill="url(#w-fg)" opacity="0.50" filter="url(#w-gblur)"
          clip-path="url(#w-cc)"/>
    <!-- Chevron mark -->
    <path d="M 316,200 L 72,100 L 72,150 L 264,200 L 72,250 L 72,300 Z"
          fill="url(#w-fg)"/>
    <!-- Sheen highlight -->
    <path d="M 316,200 L 72,100 L 72,116 L 300,200 Z"
          fill="url(#w-hl)"/>
    <!-- Inner ring -->
    <circle cx="200" cy="200" r="192" fill="none"
            stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
  </svg>

  <!-- ── FRMLS wordmark — maximum weight, thick and confident ── -->
  <!-- Montserrat 900 (Black). Baseline y=72 centers ~56px caps in 100px canvas. -->
  <text x="82" y="72"
        font-family="'Montserrat', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="56"
        font-weight="900"
        style="letter-spacing:-0.02em">
    <tspan fill="#ffffff">FRML</tspan><tspan fill="url(#w-sg)">S</tspan>
  </text>
</svg>
