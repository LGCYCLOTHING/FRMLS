<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="500" height="100">
  <!--
    FRMLS logo-wordmark.svg — 500×100px transparent background
    Space Grotesk 700 via @import — max weight available in that family.
    Falls back to Inter 900 / system-ui Black when used as <img>.
    Full word "FRMLS" gets the purple→cyan left-to-right gradient.
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
  </style>
  <defs>
    <!-- Mini icon: bg circle -->
    <radialGradient id="w-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#160330"/>
      <stop offset="55%"  stop-color="#0a0614"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- Mini icon: shape fill -->
    <linearGradient id="w-fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Mini icon: glow layer -->
    <linearGradient id="w-fg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9d5cf5"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Mini icon: ambient glows -->
    <radialGradient id="w-gp" cx="35%" cy="38%" r="46%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="w-gc" cx="68%" cy="65%" r="40%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="w-blur-h" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <clipPath id="w-cc">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
    <!--
      Full-word gradient: purple (F end) → cyan (S end).
      gradientUnits="objectBoundingBox" (default) maps 0%→leftmost
      edge of the text element and 100%→rightmost edge, so the
      entire "FRMLS" word gets the gradient naturally.
    -->
    <linearGradient id="word-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- ── Mini icon: 64×64 at x=2, y=18 (vertically centered in 100px) ── -->
  <svg x="2" y="18" width="64" height="64" viewBox="0 0 400 400">
    <circle cx="200" cy="200" r="200" fill="url(#w-bg)"/>
    <g clip-path="url(#w-cc)">
      <circle cx="200" cy="200" r="200" fill="url(#w-gp)"/>
      <circle cx="200" cy="200" r="200" fill="url(#w-gc)"/>
    </g>
    <!-- Blurred glow copy -->
    <path d="M 212,64 C 260,60 314,94 320,148 C 327,196 300,224 294,272
             C 288,312 265,336 224,342 C 186,348 148,328 120,294
             C 90,258 84,212 92,166 C 100,120 132,80 174,66
             C 187,62 198,65 212,64 Z"
          fill="url(#w-fg2)" opacity="0.55"
          filter="url(#w-blur-h)" clip-path="url(#w-cc)"/>
    <!-- Primary organic shape -->
    <path d="M 212,64 C 260,60 314,94 320,148 C 327,196 300,224 294,272
             C 288,312 265,336 224,342 C 186,348 148,328 120,294
             C 90,258 84,212 92,166 C 100,120 132,80 174,66
             C 187,62 198,65 212,64 Z"
          fill="url(#w-fg)"/>
    <!-- Inner ring -->
    <circle cx="200" cy="200" r="193" fill="none"
            stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
  </svg>

  <!--
    ── FRMLS wordmark ──
    Space Grotesk 700 (max weight). Full word gets purple→cyan gradient.
    Baseline y=72 centers the ~56px cap-height text in the 100px canvas.
    Text anchor at x=82 (icon 64px + gap 16px + margin 2px).
  -->
  <text x="82" y="72"
        font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="58"
        font-weight="700"
        fill="url(#word-grad)"
        style="letter-spacing:-0.02em">FRMLS</text>
</svg>
